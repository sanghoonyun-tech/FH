<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>미국 입시 사례·근거 정리</title>
<script>(function(){try{var t=localStorage.getItem('aes_theme');if(!t)t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css">
<style>
  :root{
    color-scheme:light;
    --bg:#f7f7f8; --surface:#ffffff; --surface-2:#fbfbfc;
    --line:#e6e6e9; --line-2:#f0f0f2;
    --ink:#1f2328; --ink-2:#4b5563; --ink-3:#8a909a;
    --accent:#2f6feb; --accent-soft:#eef3fe;
    --ok:#1a7f37; --ok-soft:#e8f4ec;
    --warn:#9a6700; --warn-soft:#fbf3e0; --note-border:#f0e3c0;
    --rose:#b3261e; --rose-soft:#fdecea;
    --muted:#6b7280; --muted-soft:#f1f2f4;
    --shadow:0 8px 28px rgba(20,22,28,.1); --shadow-lg:0 18px 50px rgba(20,22,28,.22);
    --radius:8px;
    --sans:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  :root[data-theme="dark"]{
    color-scheme:dark;
    --bg:#15171c; --surface:#1c1f26; --surface-2:#21252d;
    --line:#2c313b; --line-2:#262b33;
    --ink:#e7e9ec; --ink-2:#b3b9c2; --ink-3:#7b828d;
    --accent:#6ea8fe; --accent-soft:#1e2740;
    --ok:#5bbd76; --ok-soft:#162a1c;
    --warn:#d8a73e; --warn-soft:#2c2412; --note-border:#4a3f1e;
    --rose:#f08b82; --rose-soft:#2e1614;
    --muted:#9aa1ab; --muted-soft:#262a31;
    --shadow:0 8px 28px rgba(0,0,0,.4); --shadow-lg:0 18px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background-color .15s,color .15s;}

  .topbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--surface) 94%,transparent);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);}
  .topbar-in{max-width:1140px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:11px clamp(14px,3vw,28px);flex-wrap:wrap;}
  .brand{display:flex;flex-direction:column;gap:2px;}
  .brand .t{font-size:16px;font-weight:700;letter-spacing:-.01em;line-height:1.1;}
  .brand .s{font-size:11.5px;color:var(--ink-3);font-weight:500;}
  .nav{display:flex;gap:2px;flex-wrap:wrap;}
  .nav button{font-size:13px;font-weight:600;color:var(--ink-2);background:transparent;border:0;padding:7px 11px;border-radius:6px;cursor:pointer;transition:.12s;}
  .nav button:hover{background:var(--muted-soft);color:var(--ink);}
  .nav button.active{background:var(--ink);color:var(--surface);}
  .sp{flex:1;}
  .saved{font-size:11.5px;color:var(--ok);opacity:.7;display:flex;align-items:center;gap:5px;}
  .saved::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--ok);}
  .icon-btn{font-size:14px;line-height:1;color:var(--ink-2);background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:7px 9px;cursor:pointer;}
  .icon-btn:hover{border-color:var(--ink-3);}
  .admin-wrap{position:relative;}
  .admin-btn{font-size:12.5px;font-weight:600;color:var(--ink-2);background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:7px 12px;cursor:pointer;}
  .admin-btn:hover{border-color:var(--ink-3);}
  .admin-btn.on{background:var(--ink);color:var(--surface);border-color:var(--ink);}
  .admin-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);min-width:190px;padding:5px;display:none;}
  .admin-menu.show{display:block;}
  .admin-menu button{display:block;width:100%;text-align:left;font-size:13px;color:var(--ink-2);background:transparent;border:0;padding:8px 10px;border-radius:6px;cursor:pointer;}
  .admin-menu button:hover{background:var(--muted-soft);color:var(--ink);}
  .admin-menu .sepl{height:1px;background:var(--line);margin:5px 4px;}
  .admin-menu .lbl{font-size:10.5px;color:var(--ink-3);font-weight:600;padding:6px 10px 3px;letter-spacing:.02em;}

  .page{max-width:1140px;margin:0 auto;padding:clamp(18px,3vw,30px) clamp(14px,3vw,28px) 110px;}
  .view{display:none;} .view.active{display:block;}

  .vh{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
  .vh h2{font-size:21px;font-weight:700;letter-spacing:-.01em;}
  .vh .sub{font-size:12.5px;color:var(--ink-3);margin-top:3px;max-width:640px;}
  .vh-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .crumb{font-size:12px;color:var(--ink-3);margin-bottom:10px;}
  .crumb a{color:var(--accent);cursor:pointer;text-decoration:none;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:14px;}
  .tabs button{font-size:13.5px;font-weight:600;color:var(--ink-3);background:transparent;border:0;border-bottom:2px solid transparent;padding:8px 4px;margin-right:14px;cursor:pointer;}
  .tabs button.on{color:var(--ink);border-bottom-color:var(--ink);}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
  .chip{font-size:12px;font-weight:500;color:var(--ink-2);background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:5px 12px;cursor:pointer;transition:.12s;}
  .chip:hover{border-color:var(--ink-3);}
  .chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .chip .n{color:var(--ink-3);font-size:11px;margin-left:5px;}
  .chip.on .n{color:var(--accent);}

  .searchrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .searchrow input,.searchrow select{font-size:13px;padding:8px 11px;background:var(--surface);border:1px solid var(--line);border-radius:7px;color:var(--ink);font-family:var(--sans);}
  .searchrow input{flex:1;min-width:170px;}
  .searchrow input::placeholder{color:var(--ink-3);}

  .tbl-wrap{border:1px solid var(--line);border-radius:var(--radius);overflow:auto;background:var(--surface);}
  table.t{width:100%;border-collapse:collapse;font-size:13px;}
  table.t thead th{position:sticky;top:0;background:var(--surface-2);text-align:left;font-size:11.5px;font-weight:600;color:var(--ink-3);padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;letter-spacing:.01em;z-index:1;}
  table.t tbody td{padding:10px 12px;border-bottom:1px solid var(--line-2);vertical-align:top;color:var(--ink-2);}
  table.t tbody tr:last-child td{border-bottom:0;}
  table.t tbody tr{cursor:pointer;transition:background .1s;}
  table.t tbody tr:hover{background:var(--surface-2);}
  table.t td .nm{color:var(--ink);font-weight:600;}
  .star{color:#e0a91b;font-size:11px;margin-right:3px;}
  .meta-ct{font-size:12px;color:var(--ink-3);margin:10px 2px 0;}
  .ctag{display:inline-block;font-size:10.5px;color:var(--warn);background:var(--warn-soft);border-radius:4px;padding:1px 6px;margin:1px 3px 1px 0;}

  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;white-space:nowrap;}
  .pill.ok{color:var(--ok);background:var(--ok-soft);}
  .pill.warn{color:var(--warn);background:var(--warn-soft);}
  .pill.muted{color:var(--muted);background:var(--muted-soft);}
  .tag{display:inline-block;font-size:11px;color:var(--ink-2);background:var(--muted-soft);border-radius:5px;padding:2px 7px;}

  .note{font-size:12.5px;color:var(--ink-2);background:var(--warn-soft);border:1px solid var(--note-border);border-radius:7px;padding:9px 12px;margin-bottom:12px;line-height:1.5;}
  .empty{color:var(--ink-3);font-size:13.5px;padding:40px;text-align:center;}

  .home-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;align-items:start;}
  @media(max-width:820px){.home-grid{grid-template-columns:1fr;}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
  .card h3{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:12px;}
  .goal-list{list-style:none;display:flex;flex-direction:column;gap:9px;}
  .goal-list li{display:flex;gap:9px;font-size:13.5px;color:var(--ink-2);line-height:1.5;}
  .goal-list li::before{content:"";flex:none;width:15px;height:15px;margin-top:3px;border:1.5px solid var(--ink-3);border-radius:4px;}
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;}
  .stat{background:var(--surface-2);border:1px solid var(--line-2);border-radius:7px;padding:12px 13px;}
  .stat.flag{background:var(--warn-soft);border-color:var(--note-border);}
  .stat .n{font-size:23px;font-weight:700;letter-spacing:-.02em;line-height:1;}
  .stat .l{font-size:11px;color:var(--ink-3);margin-top:6px;}
  .bar{height:5px;background:var(--line-2);border-radius:4px;overflow:hidden;margin-top:8px;}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:4px;}
  .todo{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  @media(max-width:520px){.todo{grid-template-columns:1fr;}}
  .todo button{text-align:left;font-size:13px;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:7px;padding:11px 13px;cursor:pointer;transition:.12s;}
  .todo button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .todo button.go{background:var(--ink);color:var(--surface);border-color:var(--ink);}
  .todo button.go:hover{opacity:.92;color:var(--surface);}

  /* 분기 기준 cards */
  .axc{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:14px;}
  .axc .ah{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
  .axc .ah .ix{flex:none;width:24px;height:24px;border-radius:7px;background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .axc .ah .at{font-size:16px;font-weight:700;letter-spacing:-.01em;}
  .axc .row{display:flex;gap:12px;padding:8px 0;border-top:1px solid var(--line-2);}
  .axc .row:first-of-type{border-top:0;}
  .axc .row .k{flex:none;width:128px;font-size:11.5px;font-weight:700;color:var(--ink-3);padding-top:2px;}
  .axc .row .v{font-size:13.5px;color:var(--ink-2);line-height:1.6;}
  .axc .row.q .v{color:var(--ink);font-weight:600;}
  .axc .row.road .v{color:var(--ink-2);}

  .rep-sec{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
  .rep-sec h3{font-size:14px;font-weight:700;margin-bottom:4px;}
  .rep-sec .desc{font-size:12px;color:var(--ink-3);margin-bottom:11px;}
  .rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;}
  .rep-li{font-size:13px;color:var(--ink-2);padding:6px 0;border-bottom:1px solid var(--line-2);display:flex;justify-content:space-between;gap:12px;}
  .rep-li:last-child{border-bottom:0;}
  .rep-li .r{color:var(--ink-3);font-size:12px;text-align:right;flex:none;max-width:55%;}
  .feat{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line-2);}
  .feat:last-child{border-bottom:0;}
  .feat .num{flex:none;width:22px;height:22px;border-radius:6px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .feat .ft{font-size:13.5px;color:var(--ink);font-weight:600;}
  .feat .fd{font-size:12px;color:var(--ink-3);margin-top:2px;line-height:1.5;}
  .brk{font-size:13px;color:var(--ink-2);padding:9px 12px;border-left:3px solid var(--rose);background:var(--rose-soft);border-radius:0 6px 6px 0;margin-bottom:9px;line-height:1.55;}
  .brk b{color:var(--rose);}
  .btn{font-size:13px;font-weight:600;border-radius:7px;padding:8px 14px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);}
  .btn:hover{border-color:var(--ink-3);}
  .btn.primary{background:var(--ink);color:var(--surface);border-color:var(--ink);}
  .btn.sm{padding:6px 11px;font-size:12px;}
  .ql{font-size:13px;color:var(--ink-2);line-height:1.6;padding-left:18px;}
  .ql li{margin-bottom:6px;}

  .mbg{position:fixed;inset:0;background:rgba(10,12,16,.5);display:none;align-items:flex-start;justify-content:center;padding:42px 16px;z-index:60;overflow:auto;}
  .mbg.show{display:flex;}
  .modal{background:var(--surface);border-radius:11px;max-width:720px;width:100%;box-shadow:var(--shadow-lg);overflow:hidden;}
  .mh{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line);}
  .mh .mt{font-size:15.5px;font-weight:700;line-height:1.35;}
  .mh .badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;margin-right:7px;vertical-align:middle;}
  .badge.admit{color:var(--ok);background:var(--ok-soft);}
  .badge.control{color:var(--rose);background:var(--rose-soft);}
  .badge.policy{color:var(--accent);background:var(--accent-soft);}
  .mx{font-size:18px;color:var(--ink-3);background:transparent;border:0;cursor:pointer;line-height:1;flex:none;}
  .mb{padding:18px 20px;}
  .kbox{background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:9px;padding:13px 15px;margin-bottom:18px;}
  .kbox .kt{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:.02em;}
  .kbox .kl{display:flex;gap:8px;font-size:13px;color:var(--ink-2);padding:3px 0;line-height:1.5;}
  .kbox .kl b{flex:none;width:108px;color:var(--ink);font-weight:600;}
  .msec{font-size:12px;font-weight:700;color:var(--ink);margin:18px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--line);letter-spacing:.01em;}
  .msec:first-child{margin-top:0;}
  .mb .field{margin-bottom:11px;}
  .mb .field .k{font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.02em;margin-bottom:3px;}
  .mb .field .v{font-size:13.5px;color:var(--ink-2);line-height:1.6;}
  .mb .field .v a{color:var(--accent);}
  .kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
  .kv .cell{background:var(--surface-2);border:1px solid var(--line-2);border-radius:6px;padding:8px 10px;}
  .kv .cell .k{font-size:10.5px;color:var(--ink-3);font-weight:600;margin-bottom:2px;}
  .kv .cell .v{font-size:12.5px;color:var(--ink);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-grid .full{grid-column:1/-1;}
  .fld label{display:block;font-size:11px;font-weight:700;color:var(--ink-3);margin-bottom:4px;letter-spacing:.01em;}
  .fld input,.fld select,.fld textarea{width:100%;font-family:var(--sans);font-size:13px;padding:8px 10px;background:var(--surface);border:1px solid var(--line);border-radius:7px;color:var(--ink);}
  .fld textarea{resize:vertical;min-height:54px;line-height:1.5;}
  textarea#bulkText{width:100%;font-family:var(--sans);font-size:12.5px;padding:9px 11px;border:1px solid var(--line);border-radius:7px;resize:vertical;color:var(--ink);background:var(--surface);}
  .mfoot{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--surface);}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--surface);font-size:13px;padding:10px 18px;border-radius:8px;opacity:0;pointer-events:none;transition:.2s;z-index:80;max-width:90vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <span class="t">미국 입시 사례·근거 정리</span>
      <span class="s">공개 사례와 카운셀러 요인을 모아, 로드맵을 짤 때 갈리는 분기 기준을 정리합니다.</span>
    </div>
    <nav class="nav" id="nav">
      <button data-view="home">홈</button>
      <button data-view="cases">학생 사례</button>
      <button data-view="factors">카운셀러 요인</button>
      <button data-view="evidence">근거 자료</button>
      <button data-view="axes">분기 기준</button>
      <button data-view="report">정리본</button>
    </nav>
    <div class="sp"></div>
    <span class="saved" id="saved">저장됨</span>
    <button class="icon-btn" id="themeBtn" title="라이트 / 다크 전환" onclick="toggleTheme()">☾</button>
    <div class="admin-wrap">
      <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">관리</button>
      <div class="admin-menu" id="adminMenu">
        <div class="lbl">정리 도구</div>
        <button onclick="setView('admin-hyps')">가설 후보</button>
        <button onclick="setView('admin-claims')">근거 문장</button>
        <div class="sepl"></div>
        <div class="lbl">데이터</div>
        <button onclick="exportJSON()">백업 내보내기</button>
        <button onclick="document.getElementById('impFile').click()">백업 복원</button>
        <button onclick="openBulk()">근거 일괄 추가</button>
      </div>
    </div>
    <input type="file" id="impFile" accept="application/json" style="display:none" onchange="importJSON(event)">
    <input type="file" id="bulkFile" accept="application/json,.json,.csv,.tsv" style="display:none" onchange="bulkFile(event)">
  </div>
</div>

<div class="page">
  <div class="view" id="view-home"></div>
  <div class="view" id="view-cases"></div>
  <div class="view" id="view-factors"></div>
  <div class="view" id="view-evidence"></div>
  <div class="view" id="view-axes"></div>
  <div class="view" id="view-report"></div>
  <div class="view" id="view-admin-hyps"></div>
  <div class="view" id="view-admin-claims"></div>
</div>

"e-nacac-factors","sourceId":"src-nacac-soca","title":"NACAC — 대학이 중시한다고 말하는 평가 요소 순위","summary":"NACAC 조사: college-prep 과목 성적이 가장 중요(대학의 79.2%가 'considerable importance'), 그 다음 과목 강도(rigor)·시험점수. 에세이는 사립 33% vs 공립 10%만 considerable — 학교군별로 가중이 갈림. 추천서·활동은 considerable 비중 낮음(활동 6.5% considerable / 44% moderate). character는 에세이·추천서·활동으로 간접 평가.","evidenceRole":"policy","category":"review-criteria","schoolGroup":"General","institution":"","yearCycle":"2019-2023","caution":"대학 입학처의 '자기보고'. 실제 가중·상호작용·알고리즘은 비공개. '무엇을 본다'는 알아도 '얼마나 가른다'는 추론. 조부곤의 '카운셀러가 중시하는 것' 요청에 대한 1차 답이되, 카운셀러 개인 의견이 아니라 대학 집계임에 유의.","verificationStatus":"needs-primary","sourceType":"official","sourceName":"NACAC State of College Admission","url":"https://www.nacacnet.org/factors-in-college-admission/","reliability":"high","quote":"","suggestedRelation":"","id":"e-nacac-factors"},{"evidenceId":"e-bayarea-bottleneck","sourceId":"src-ceg-siliconvalley","title":"Bay Area Asian 밀집 → Stanford/UC CS '병목'","summary":"컨설턴트(College Essay Guy) 관찰: Palo Alto·Cupertino·Fremont 등 Bay Area는 Asian American 밀집 고성취 학군. 여기서 Stanford·UC Berkeley CS를 노리면 '반경 50마일 안 비슷한 배경 수천 명과 경쟁하는 병목'. 같은 정량·전공이라도 풀 내부 경쟁이 합격을 어렵게 만든다는 framing.","evidenceRole":"interpretation","category":"residency","schoolGroup":"UC","institution":"","yearCycle":"2025","caution":"컨설턴트 framing(공식 아님). '거주지/지역이 합격을 가른다'가 아니라 '같은 지역 풀 내 경쟁이 심하다'는 풀 효과를 말함 — 둘을 혼동 금지. UC는 CA 거주자에게 in-state.","verificationStatus":"unverified","sourceType":"consultant","sourceName":"College Essay Guy","url":"https://www.collegeessayguy.com/blog/applying-to-college-as-an-asian-student-from-silicon-valley","reliability":"mid","quote":"","suggestedRelation":"","id":"e-bayarea-bottleneck"},{"evidenceId":"e-uc-asian-share","sourceId":"src-uc-asian-admit","title":"UC — Asian American이 합격생 최대 집단(~35%), in-state 우선","summary":"UC 공식 데이터(보도): Asian American이 합격 first-year의 약 35%로 인종 집단 중 최대이며 합격률도 최고 수준(과거 Berkeley·UCLA ~40%). 최근 CA 거주자 합격 사상 최대, OOS 19%↓. Prop 209로 인종 직접 고려 불가.","evidenceRole":"statistic","category":"residency","schoolGroup":"UC","institution":"","yearCycle":"2024","caution":"집계 합격률 ≠ 개인 합격 확률. 캠퍼스·전공별 편차 큼. '최대 집단·최고 합격률'은 풀 규모 때문이기도 함 — 개별 유리함으로 단정 금지.","verificationStatus":"needs-primary","sourceType":"media","sourceName":"UC 공식 데이터 (보도)","url":"https://www.aol.com/news/uc-admits-record-number-californians-163024334.html","reliability":"high","quote":"","suggestedRelation":"","id":"e-uc-asian-share"},{"evidenceId":"e-bergen-cluster","sourceId":"src-bergen-census","title":"동부 한인 밀집 — Bergen County(NJ) + 명문 feeder 학군","summary":"미 인구조사: Bergen County(NJ)에 한인 64,121명 = 카운티 인구의 6.7%로 미 전국 카운티 중 최고 비율, NJ 전체 한인의 57.5%가 이 한 카운티에 집중(NYC·GW Bridge 인근). 이 지역에 Bergen County Academies 등 전국 top 고교, Princeton High 등 Ivy 다수 배출 feeder 학교 위치.","evidenceRole":"statistic","category":"residency","schoolGroup":"Ivy/Private","institution":"","yearCycle":"2022-2024","caution":"인구·학군 데이터. '동부 거주가 Ivy 합격을 가른다'를 보여주는 게 아님 — 동부 한인이 Ivy 인근 고자원 명문 학군에 밀집해 있다는 사실일 뿐. 거주지와 학군/자원/근접성을 분리해야.","verificationStatus":"needs-primary","sourceType":"media","sourceName":"Census / Bergen County","url":"https://en.wikipedia.org/wiki/Bergen_County,_New_Jersey","reliability":"high","quote":"","suggestedRelation":"","id":"e-bergen-cluster"},{"evidenceId":"e-korean-pop-dist","sourceId":"src-korean-pop-us","title":"한인 인구 분포 — CA·NY·TX·NJ 집중","summary":"Census 기반: 한인 인구는 CA 558K, NY 142K, TX 115K, NJ 114K, VA·WA 순으로 집중. LA 메트로와 NY 메트로가 최대. 서부(CA)와 동부(NY·NJ)에 양극 집중.","evidenceRole":"statistic","category":"residency","schoolGroup":"General","institution":"","yearCycle":"2023","caution":"인구 맥락 데이터일 뿐. 진학 결과와 직접 인과 아님 — 어디 사느냐가 어디 합격하느냐를 가른다는 증거로 쓰면 안 됨.","verificationStatus":"needs-primary","sourceType":"media","sourceName":"Korean Americans (Census 정리)","url":"https://en.wikipedia.org/wiki/Korean_Americans","reliability":"high","quote":"","suggestedRelation":"","id":"e-korean-pop-dist"},{"evidenceId":"e-regional-confound","sourceId":"src-regional-confound","title":"★ 핵심 반례 — '서부→Stanford, 동부→Ivy'는 거주지가 아니라 인구·학군 confound일 가능성","summary":"수집 자료 종합: 조부곤의 '서부→Stanford, 동부→Ivy' 패턴은 descriptive하게는 보일 수 있으나, 원인은 (1) 한인 가정이 Bay Area·Bergen County 같은 고자원 명문 학군에 밀집 (2) UC는 CA 거주자 in-state (3) 동부는 Ivy 근접·prep 파이프라인 — 즉 '거주지가 평가를 가른다'가 아니라 '풀·학군·자원·근접성'이 진짜 변수일 가능성. 서부·동부 양쪽에 대칭적으로 같은 confound가 존재.","evidenceRole":"counterexample","category":"residency","schoolGroup":"General","institution":"","yearCycle":"2024-2026","caution":"이건 '입증된 사실'이 아니라 검증해야 할 confound 가설. 단, 지리적 다양성(geographic diversity)은 사립에서 미세하게 실재하는 요인이므로 '거주지 효과 0'도 과장. '거주지가 가른다 vs 거주지는 풀의 대리변수다'를 사례로 가려야.","verificationStatus":"unverified","sourceType":"analysis-note","sourceName":"지역-학교군 confound 분석 메모","url":"","reliability":"low","quote":"","suggestedRelation":"counterexample","id":"e-regional-confound"},{"evidenceId":"e-counselor-holistic","sourceId":"src-counselor-holistic","title":"카운셀러·전직 AO가 말하는 평가 우선순위 (요구2)","summary":"전직 Princeton/Dartmouth 입학사정관 등 컨설턴트 공통: 평가는 holistic이되 학업(GPA+과목 rigor+제출 시 시험)이 1순위로 '이 학생이 이 학교 공부를 할 수 있나'를 먼저 본다. 그 위에 essay·추천서·활동이 character·authenticity·진정성을 드러내는 역할. CS/Engineering 같은 impacted major는 STEM 커리큘럼을 특히 집중 심사. demonstrated interest·fit도 고려. '20개 클럽 체크'보다 한 분야의 initiative·성장.","evidenceRole":"interpretation","category":"review-criteria","schoolGroup":"General","institution":"","yearCycle":"2025","caution":"전직 AO·컨설턴트의 '공개 발언' 종합. 학교별 실제 가중·알고리즘은 비공개. '중시한다고 말하는 것'과 '실제로 가르는 것'은 다를 수 있음.","verificationStatus":"needs-primary","sourceType":"consultant","sourceName":"전직 AO·컨설턴트 종합","url":"https://www.crimsoneducation.org/us/blog/what-do-colleges-really-mean-by-holistic-admissions","reliability":"mid","quote":"","suggestedRelation":"","id":"e-counselor-holistic"},{"evidenceId":"e-asian-odds-study","sourceId":"src-grossman-asian","title":"Asian 합격 odds ~28% 낮음 (Grossman et al. 2023, n=685,709)","summary":"아시안+백인 지원 685,709건(2015-16부터 5사이클) 분석: 비슷한 시험점수·GPA·활동을 가진 백인 대비 아시안 지원자의 (최소 1곳) 합격 odds가 약 28% 낮음. 남아시안은 49% 낮음. 요인 (1) legacy 우대 — 백인이 nsultant","relatedAxis":"ax-signal-coherence","evidenceIds":["e-nacac-factors","e-case-v2","e-ucsb"],"caution":"분야·학교별 상이. n=1 후기 일반화 주의.","roadmapUse":"G10~G11 활동 정리, 산출물 설계"},{"factorId":"f-testing","cluster":"strategy","factor":"Testing in Context (2025-26 시험)","whatCounselorsSay":"다수 최상위(대부분 Ivy·Stanford·MIT·Caltech·Georgetown·JHU·UT Austin)가 시험 필수로 회귀. 점수는 '맥락 속'에서 해석(고자원/저자원 1550을 같게 보지 않음).","appliesTo":"Ivy / Private","evidenceBasis":"official","consensus":"strong","sourceQuality":"official","relatedAxis":"ax-school-game","evidenceIds":["e-testing-reinstate-2026","e-case-kr3","e-ucsb"],"caution":"학교·연도별 시행 시점 상이. 지원 직전 각 입학처 재확인 필수.","roadmapUse":"G11 시험 계획 — SAT/ACT 응시·제출 여부"},{"factorId":"f-context-roi","cluster":"context","factor":"Region Context & ROI (지역·비용 맥락)","whatCounselorsSay":"Asian 밀집 지역은 풀 경쟁으로 상대적 불리 경향(Grossman). 비용·ROI·merit 때문에 동북부에서 남부 공립으로 선회하는 흐름도 큼.","appliesTo":"General","evidenceBasis":"data + media","consensus":"weak","sourceQuality":"analysis-note","relatedAxis":"ax-choice-constraint","evidenceIds":["e-asian-odds-study","e-geo-region-penalty","e-southern-public-surge","e-case-kr1","e-case-v5","e-uc-official-13"],"caution":"인과 단정 금지(밀집은 풀 규모 효과 포함). 매체 보도 수치는 1차 확인 권장.","roadmapUse":"학교 리스트 구성, in-state/OOS·비용 전략"}],"links":[{"id":"l-seed1","hypId":"h-uc","claimId":"clm-uc13-1","evId":"e-uc13","relation":"ambiguous","strength":"medium","rationale":"UC 공식 평가에 academic 항목이 9개 — academic quality를 본다는 가설을 지지하나, 그게 CS/Data 합격을 직접 가른다는 증명은 아님","limitation":"","reviewStatus":"human-reviewed","interpretation":"UC 공식 평가에 academic 항목이 9개 — academic quality를 본다는 가설을 지지하나, 그게 CS/Data 합격을 직접 가른다는 증명은 아님"},{"id":"l-seed2","hypId":"h-uc","claimId":"clm-ucsb-1","evId":"e-ucsb","relation":"ambiguous","strength":"medium","rationale":"후기는 꾸준함·발전을 강조하나 n=1 자기해석","limitation":"","reviewStatus":"human-reviewed","interpretation":"후기는 꾸준함·발전을 강조하나 n=1 자기해석"},{"id":"l-seed3","hypId":"h-uc","claimId":"clm-younger-1","evId":"e-younger","relation":"support","strength":"medium","rationale":"활동 많아도 깊이 약해 전멸 → academic quality가 가른다 방향 지지","limitation":"","reviewStatus":"human-reviewed","interpretation":"활동 많아도 깊이 약해 전멸 → academic quality가 가른다 방향 지지"},{"id":"l-seed4","hypId":"h-private","claimId":"clm-fitz-1","evId":"e-fitz","relation":"ambiguous","strength":"medium","rationale":"\"높이 본다\"까지 지지, \"가른다\"는 미증명. 클래스 구성 변수 존재","limitation":"","reviewStatus":"human-reviewed","interpretation":"\"높이 본다\"까지 지지, \"가른다\"는 미증명. 클래스 구성 변수 존재"}],"ui":{"view":"home","selectedHyp":"h-uc"}}</script>
<script>
/* ===== theme ===== */
const THEME_KEY='aes_theme';
function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); const b=document.getElementById('themeBtn'); if(b)b.textContent=(t==='dark'?'☀':'☾'); }
function setTheme(t){ try{localStorage.setItem(THEME_KEY,t);}catch(e){} applyTheme(t); }
function toggleTheme(){ const cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light'; setTheme(cur==='dark'?'light':'dark'); }

/* ===== storage ===== */
const KEY='admissions_research_v1';
const Store={ load(){ try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){return null;} },
  save(s){ try{localStorage.setItem(KEY,JSON.stringify(s));ping();}catch(e){console.error(e);} } };
const SEED=JSON.parse(document.getElementById('seed').textContent);
let S=Store.load()||SEED;

(function normalize(){
  ['sources','evidence','claims','axes','hypotheses','factors','links'].forEach(k=>{ if(!Array.isArray(S[k])) S[k]=[]; });
  S.evidence.forEach(e=>{ if(!e.id&&e.evidenceId)e.id=e.evidenceId; if(!e.evidenceId&&e.id)e.evidenceId=e.id; if(e.reliability==='med')e.reliability='mid'; });
  S.sources.forEach(s=>{ if(s.baseReliability==='med')s.baseReliability='mid'; });
  const seen=new Set();
  S.claims.forEach(c=>{ let id=c.claimId||('clm-'+Math.random().toString(36).slice(2,7)); if(seen.has(id)){let n=2,nid=id+'-'+n;while(seen.has(nid)){n++;nid=id+'-'+n;} id=nid;} c.claimId=id; seen.add(id); });
  if(!S.ui)S.ui={}; if(!S.ui.view)S.ui.view='home';
})();

function persist(){ Store.save(S); }
function uid(p){ return (p||'')+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cut(s,n){ s=(s||'').toString(); return s.length>n? esc(s.slice(0,n-1))+'…' : esc(s); }
let svT; function ping(){ const e=document.getElementById('saved'); if(!e)return; e.textContent='저장됨 ✓';e.style.opacity='1';clearTimeout(svT);svT=setTimeout(()=>{e.textContent='저장됨';e.style.opacity='.7';},1000); }
function toast(m){ const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),m.length>40?3200:1800); }

/* ===== resolvers ===== */
function getEvidence(id){ return S.evidence.find(e=>e.evidenceId===id||e.id===id); }
function claimsOfEvidence(eid){ return S.claims.filter(c=>c.evidenceId===eid); }
function axisById(id){ return (S.axes||[]).find(a=>a.axisId===id); }
function axisName(id){ const a=axisById(id); return a?a.axisName:''; }
function factorsForEvidence(id){ const e=getEvidence(id); return (S.factors||[]).filter(f=>(f.evidenceIds||[]).includes(id)||(e&&(f.evidenceIds||[]).includes(e.id))); }
function axesForCase(e){ const ax=new Set();
  (S.factors||[]).forEach(f=>{ const ids=f.evidenceIds||[]; if(ids.includes(e.evidenceId)||ids.includes(e.id)){ if(f.relatedAxis)ax.add(f.relatedAxis);} });
  const key=caseNameRaw(e).split(/[(（,—-]/)[0].trim();
  (S.axes||[]).forEach(a=>{ if(key&&key.length>=2&&(a.relatedCaseNames||'').includes(key))ax.add(a.axisId); });
  return [...ax].map(axisById).filter(Boolean);
}

/* ===== labels ===== */
const VERIF={checked:['확인','ok'],'needs-primary':['1차확인 필요','warn'],unverified:['미확인','muted']};
function verifPill(v){ const x=VERIF[v]||['—','muted']; return `<span class="pill ${x[1]}">${x[0]}</span>`; }
const SRCT={official:'공식',cds:'CDS','cds-secondary':'CDS(2차)',media:'언론',testimony:'후기',consultant:'컨설팅',community:'커뮤니티','analysis-note':'분석메모',study:'연구',statistic:'통계'};
function srcTypeLabel(t){ return SRCT[t]||t||'—'; }
const CAT={'official-policy':'공식 정책',testing:'시험 정책','academic-rigor':'학업·과목','activity-depth':'활동 깊이','essay-piq':'에세이·PIQ',major:'전공 경쟁',residency:'거주·지역',strategy:'지원 전략','outcome-case':'합격 사례',market:'시장 흐름','review-criteria':'평가 요소'};
function catLabel(c){ return CAT[c]||c||'—'; }
const RELL={high:'높음',mid:'보통',low:'낮음'};
function relLabel(r){ return RELL[r]||r||'—'; }
const CONS={strong:'강함',medium:'보통',weak:'약함'};
const QUAL={official:'공식',cds:'CDS',consultant:'컨설팅',media:'언론','analysis-note':'분석메모',study:'연구',testimony:'후기',community:'커뮤니티'};
const KA={'explicit-korean':'한인','explicit-korean-american':'한인(미국)','explicit-asian':'아시안',inferred:'아시안(추정)',unknown:'미상'};
const CTYPE={admit:['합격','admit'],control:['대조군','control'],policy:['정책·트렌드','policy']};
function caseTypeOf(e){ if(e.caseType)return e.caseType; if(e.evidenceRole!=='case')return 'policy'; const b=((e.resultSchool||'')+(e.caution||'')+(e.title||'')).toLowerCase(); if(/불합격|reject|전멸|negative|대조|비교군/.test(b))return 'control'; return 'admit'; }
function bgTag(e){ const k=e.koreanAsianStatus; return KA[k]|| (e.koreanAsian? cut(e.koreanAsian,12):'미상'); }
function regionLabel(e){ const r=e.region||''; if(r.includes('West'))return '서부'; if(r.includes('East'))return '동부'; if(r.includes('Intl')||r.includes('Korea'))return '해외'; if(r.includes('South'))return '남부'; if(r.includes('Midwest'))return '중서부'; return r? cut(r,10):'기타'; }
function keySignal(e){ return e.narrativeSignal||e.activitySignal||e.academicSignal||e.strategySignal||e.interpretation||''; }
function caseNameRaw(e){ return (e.title||'').replace(/^개별 사례 — /,'').replace(/^\[패턴\]\s*/,'').replace(/^★\s*/,''); }
function caseName(e){ return cut(caseNameRaw(e),46); }
function quantSummary(e){ const p=[]; if(e.gpa)p.push('GPA '+e.gpa); if(e.sat)p.push('SAT '+e.sat); if(e.act)p.push('ACT '+e.act); if(p.length)return esc(p.join(' · ')); return e.academicSignal?cut(e.academicSignal,56):'—'; }
function cautionTagsOf(e){ const t=[]; const v=e.verificationStatus;
  if(v==='needs-primary')t.push('원문 확인 필요'); else if(v==='unverified')t.push('미확인');
  if(caseTypeOf(e)==='control')t.push('비교군');
  if(e.sourceType==='testimony'||/자기진술|후기/.test(e.sourceName||''))t.push('자기진술');
  else if(e.sourceType==='media')t.push('매체');
  const ym=((e.yearCycle||'')+'').match(/20\d\d/); if(ym&&parseInt(ym[0])<=2020)t.push('오래된 사례');
  const blob=((e.facts||'')+(e.interpretation||'')+(e.resultSchool||'')+(e.strategySignal||'')).toLowerCase();
  if(/transfer|편입|junior/.test(blob))t.push('freshman 아님');
  if(/athlete|특기생|recruit|hook/.test(blob))t.push('hook 분리');
  return [...new Set(t)];
}

/* ===== in-place filter ===== */
function tblFilter(q,tbodyId,countId){ q=(q||'').toLowerCase().trim(); let n=0; const tb=document.getElementById(tbodyId); if(!tb)return;
  tb.querySelectorAll('tr[data-hay]').forEach(tr=>{ const s=!q||tr.getAttribute('data-hay').indexOf(q)>-1; tr.style.display=s?'':'none'; if(s)n++; });
  const c=document.getElementById(countId); if(c)c.textContent=n; }

/* ===== router ===== */
function setView(v){ S.ui.view=v; persist(); closeAdmin(); render(); window.scrollTo(0,0); }
document.getElementById('nav').addEventListener('click',e=>{ const b=e.target.closest('button'); if(b&&b.dataset.view) setView(b.dataset.view); });
function toggleAdmin(){ document.getElementById('adminMenu').classList.toggle('show'); document.getElementById('adminBtn').classList.toggle('on'); }
function closeAdmin(){ document.getElementById('adminMenu').classList.remove('show'); document.getElementById('adminBtn').classList.remove('on'); }
document.addEventListener('click',e=>{ if(!e.target.closest('.admin-wrap')) closeAdmin(); });
function render(){ const v=S.ui.view;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('adminBtn').classList.toggle('on',v.startsWith('admin-'));
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='view-'+v));
  ({home:renderHome,cases:renderCases,factors:renderFactors,evidence:renderEvidence,axes:renderAxes,report:renderReport,
    'admin-hyps':renderHyps,'admin-claims':renderClaims}[v]||renderHome)(); }

/* ===== STUDENT CASES ===== */
let caseTab='individual', caseFilter='all', caseSearch='';
function matchCase(e,f){
  const r=e.region||'',k=e.koreanAsianStatus||''; const rs=((e.resultSchool||'')+' '+(e.schoolGroup||'')).toLowerCase();
  switch(f){
    case 'all':return true;
    case 'west':return r.includes('West');
    case 'east':return r.includes('East');
    case 'korean':return k==='explicit-korean'||k==='explicit-korean-american';
    case 'asian':return k==='explicit-asian'||caseTypeOf(e)==='control';
    case 'stanford':return rs.includes('stanford');
    case 'ucb':return rs.includes('berkeley')||rs.includes('ucla')||rs.includes('uc berkeley');
    case 'ivymit':return rs.includes('mit')||(e.schoolGroup||'').toLowerCase().includes('ivy')||/harvard|yale|princeton|cornell|brown|columbia|dartmouth|penn|upenn/.test(rs);
    case 'needsprimary':return (e.verificationStatus||'')!=='checked';
  } return true;
}
function setCaseTab(t){ caseTab=t; caseFilter='all'; renderCases(); }
function setCaseFilter(f){ caseFilter=f; renderCases(); }
function renderCases(){
  const base=S.evidence.filter(e=>e.evidenceRole==='case'&&(e.caseKind||'individual')===caseTab);
  const rows=base.filter(e=>matchCase(e,caseFilter));
  const ct=f=>base.filter(e=>matchCase(e,f)).length;
  const chips=[['all','전체'],['west','서부권'],['east','동부권'],['korean','명시적 한인'],['asian','아시안·비교군'],['stanford','Stanford 포함'],['ucb','UC Berkeley·UCLA'],['ivymit','Ivy·MIT'],['needsprimary','원문 확인 필요']];
  const head=['사례','지역','배경','결과','학교군','관심 분야','핵심 신호','주의 태그','확인상태'];
  const hay=e=>esc([caseNameRaw(e),e.resultSchool,e.schoolGroup,e.major,e.region,keySignal(e),bgTag(e)].join(' ').toLowerCase());
  document.getElementById('view-cases').innerHTML=`
    <div class="vh">
      <div><h2>학생 사례</h2><div class="sub">미국 거주 한인·아시안 학생의 공개 결과 사례. 행을 누르면 노션형 상세가 열립니다. (사실과 해석을 분리해 봅니다.)</div></div>
      <div class="vh-actions">
        <button class="btn primary sm" onclick="openAddCase()">+ 학생 사례 추가</button>
        <button class="btn sm" onclick="openBulk()">일괄 추가</button>
      </div>
    </div>
    <div class="tabs">
      <button class="${caseTab==='individual'?'on':''}" onclick="setCaseTab('individual')">개별 사례</button>
      <button class="${caseTab==='pattern'?'on':''}" onclick="setCaseTab('pattern')">패턴 메모</button>
    </div>
    ${caseTab==='pattern'?`<div class="note">패턴 메모는 개별 사례가 쌓인 뒤 작성하는 2차 정리입니다. 개별 사례의 사실 정보와 섞지 않습니다.</div>`:''}
    <div class="chips">${chips.map(c=>`<button class="chip ${caseFilter===c[0]?'on':''}" onclick="setCaseFilter('${c[0]}')">${c[1]}<span class="n">${ct(c[0])}</span></button>`).join('')}</div>
    <div class="searchrow"><input type="text" id="caseq" placeholder="학교·전공·신호 검색 (예: Stanford, Berkeley, MIT, Ivy)" oninput="caseSearch=this.value;tblFilter(caseSearch,'caseTbody','caseShown')"></div>
    <div class="tbl-wrap"><table class="t"><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody id="caseTbody">
      ${rows.length?rows.map(e=>`<tr data-hay="${hay(e)}" onclick="openCase('${e.evidenceId}')">
        <td><span class="nm">${e.featured?'<span class="star">★</span>':''}${caseName(e)}</span></td>
        <td>${regionLabel(e)}</td>
        <td><span class="tag">${bgTag(e)}</span></td>
        <td>${cut(e.resultSchool||e.summary,36)}</td>
        <td>${cut(e.schoolGroup,16)||'—'}</td>
        <td>${cut(e.major,16)||'—'}</td>
        <td>${cut(keySignal(e),34)||'—'}</td>
        <td>${cautionTagsOf(e).slice(0,3).map(t=>`<span class="ctag">${esc(t)}</span>`).join('')||'—'}</td>
        <td>${verifPill(e.verificationStatus)}</td>
      </tr>`).join(''):`<tr><td colspan="9" class="empty">해당하는 사례가 없습니다.</td></tr>`}
    </tbody></table></div>
    <div class="meta-ct"><span id="caseShown">${rows.length}</span>건 표시 · ${caseTab==='individual'?'개별 사례':'패턴 메모'} 총 ${base.length}건</div>`;
  if(caseSearch){ const q=document.getElementById('caseq'); if(q)q.value=caseSearch; tblFilter(caseSearch,'caseTbody','caseShown'); }
}

/* ===== Notion-style case detail ===== */
function fld(k,v){ return v?`<div class="field"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`:''; }
function openCase(id){
  const e=getEvidence(id); if(!e)return; const ct=caseTypeOf(e); const tb=CTYPE[ct]||CTYPE.admit;
  const axes=axesForCase(e);
  const axHtml=axes.length?`<div class="field"><div class="k">연결되는 분기 기준</div><div class="v">${axes.map(a=>`<span class="tag" style="cursor:pointer" onclick="closeModal();setView('axes')">${esc(a.axisName)}</span>`).join(' ')}</div></div>`:'';
  const srcHtml=`<div class="msec">원문 출처</div>${fld('출처', (e.sourceName||srcTypeLabel(e.sourceType)))}${e.url?`<div class="field"><div class="v"><a href="${esc(e.url)}" target="_blank" rel="noopener">원문 열기 ↗</a></div></div>`:''}`;
  const ctags=cautionTagsOf(e);
  const cautionHtml=`<div class="msec">주의점</div>${e.caution?`<div class="field"><div class="v" style="color:var(--warn)">${esc(e.caution)}</div></div>`:''}${ctags.length?`<div class="field"><div class="v">${ctags.map(t=>`<span class="ctag">${esc(t)}</span>`).join('')}</div></div>`:''}<div class="field"><div class="v" style="color:var(--ink-3);font-size:12px;">n=1 · 생존자 편향 · 자기/매체 해석 가능 · 합격 원인 단정 불가</div></div>`;

  const summary=`<div class="kbox"><div class="kt">한눈에 보기</div>
    <div class="kl"><b>결과</b><span>${esc(e.resultSchool||'—')}</span></div>
    <div class="kl"><b>핵심 정량</b><span>${quantSummary(e)}</span></div>
    <div class="kl"><b>핵심 정성</b><span>${esc(e.essayTheme||e.narrativeSignal||'—')}</span></div>
    <div class="kl"><b>강한 활동 신호</b><span>${esc(e.activities||e.activitySignal||'—')}</span></div>
    <div class="kl"><b>이 사례에서 볼 점</b><span>${esc(e.advice||e.interpretation||'—')}</span></div></div>`;

  const basic=`<div class="msec">기본 정보</div><div class="kv" style="margin-bottom:6px;">
    <div class="cell"><div class="k">지역</div><div class="v">${esc(e.region||'—')}</div></div>
    <div class="cell"><div class="k">배경</div><div class="v">${esc(e.koreanAsian||KA[e.koreanAsianStatus]||'—')}</div></div>
    <div class="cell"><div class="k">학교 / 학년</div><div class="v">${esc(e.hsType||'—')}</div></div>
    <div class="cell"><div class="k">관심 전공</div><div class="v">${esc(e.major||'—')}</div></div>
    <div class="cell"><div class="k">지원 결과</div><div class="v">${cut(e.resultSchool,40)||'—'}</div></div>
    <div class="cell"><div class="k">확인상태</div><div class="v">${verifPill(e.verificationStatus)}</div></div></div>`;

  const quant=`<div class="msec">정량 요소</div>${fld('GPA',e.gpa)}${fld('SAT / ACT',[e.sat,e.act].filter(Boolean).join(' / '))}${fld('AP / IB',e.apList)}${fld('수상 / 기타',e.awards)}${fld('학업 신호',e.academicSignal)}`;

  let body;
  if(ct==='control'){
    body=summary+basic+quant
      +(`<div class="msec">결과</div>${fld('지원 결과',e.resultSchool)}`)
      +(e.activities||e.activitySignal?`<div class="msec">Activities</div>${fld('활동',e.activities||e.activitySignal)}`:'')
      +(e.essayTheme||e.narrativeSignal?`<div class="msec">Essay</div>${fld('소재·서사',[e.essayTheme,e.narrativeSignal].filter(Boolean).join(' · '))}`:'')
      +(e.breaksConvention?`<div class="msec">이 사례가 깨는 통념</div><div class="brk"><b>통념 반증</b> ${esc(e.breaksConvention)}</div>`:'')
      +(e.interpretation?`<div class="msec">해석 가능성</div>${fld('가능한 패턴',e.interpretation)}`:'')
      +axHtml+cautionHtml+srcHtml;
  } else {
    body=summary+basic+quant
      +(`<div class="msec">정성 요소</div>${fld('배경',e.studentBg||e.koreanAsian)}${fld('Essay Theme',e.essayTheme)}${fld('Narrative',e.narrativeSignal)}`)
      +(`<div class="msec">Activities</div>${fld('활동',e.activities||e.activitySignal)}`)
      +(e.essayTheme||e.narrativeSignal?`<div class="msec">Essay</div>${fld('에세이 소재·방향',[e.essayTheme,e.narrativeSignal].filter(Boolean).join(' · '))}`:'')
      +(e.recommendation?`<div class="msec">Recommendation</div>${fld('추천서',e.recommendation)}`:'')
      +(e.advice?`<div class="msec">Advice / 배울 점</div>${fld('조언',e.advice)}`:'')
      +(e.strategySignal?fld('지원 전략',e.strategySignal):'')
      +(e.interpretation?`<div class="msec">해석 가능성</div>${fld('가능한 패턴',e.interpretation)}`:'')
      +axHtml+cautionHtml+srcHtml;
  }
  openModal(`<div class="mh"><span class="mt"><span class="badge ${tb[1]}">${tb[0]}</span>${e.featured?'<span class="star">★</span>':''}${esc(caseNameRaw(e))}</span><button class="mx" onclick="closeModal()">✕</button></div>
    <div class="mb"><div style="margin-bottom:14px;"><button class="btn sm" onclick="toggleFeatured('${e.evidenceId}')">${e.featured?'★ 대표 사례 해제':'☆ 대표 사례로 지정'}</button></div>${body}</div>`);
}
function toggleFeatured(id){ const e=getEvidence(id); if(!e)return; e.featured=!e.featured; persist(); openCase(id); toast(e.featured?'대표 사례로 지정':'대표 사례 해제'); }

function saveCase(){ const g=id=>(document.getElementById(id).value||'').trim();
  const title=g('ac_title'); if(!title){toast('사례명을 입력하세요');return;}
  const rb=g('ac_region'),rd=g('ac_regiond'); const region=rb?(rd?rb+' / '+rd:rb):rd; const id=uid('e-');
  S.evidence.push({evidenceId:id,id,evidenceRole:'case',category:'outcome-case',caseType:g('ac_ctype')||'admit',caseKind:g('ac_kind')||'individual',

function repLine(e){ return `${regionLabel(e)} ${bgTag(e)} · ${cut(e.resultSchool||e.schoolGroup,38)} · ${cut(e.essayTheme||keySignal(e),32)}`; }
function reportData(){
  const cases=S.evidence.filter(e=>e.evidenceRole==='case');
  const ind=cases.filter(e=>(e.caseKind||'individual')==='individual');
  const featured=cases.filter(e=>e.featured);
  const control=cases.filter(e=>caseTypeOf(e)==='control');
  const kor=ind.filter(e=>(e.koreanAsianStatus||'').startsWith('explicit-korean'));
  const west=ind.filter(e=>(e.region||'').includes('West'));
  const east=ind.filter(e=>(e.region||'').includes('East'));
  const vc={checked:0,'needs-primary':0,unverified:0}; ind.forEach(e=>{const v=e.verificationStatus||'unverified';vc[v]=(vc[v]||0)+1;});
  const open=(S.axes||[]).map(a=>a.openQuestions).filter(Boolean);
  return {ind,featured,control,kor,west,east,vc,open};
}

  L.push('## 2. 대표 사례'); d.featured.forEach((e,i)=>L.push(`${i+1}. ${caseNameRaw(e)} — ${repLine(e).replace(/\s+·\s+/g,' · ')}`));
  L.push('','## 3. 대조군에서 보이는 점'); d.control.filter(e=>e.breaksConvention).forEach(e=>L.push(`- ${caseNameRaw(e)}: ${(e.breaksConvention||'').slice(0,140)}`));

  L.push('','## 6. 다음 확인 질문'); d.open.forEach(q=>L.push(`- ${q.split('/')[0].trim()}`));

  try{navigator.clipboard.writeText(L.join('\n'));toast('정리본 .md 다운로드 + 클립보드 복사 완료');}catch(e){toast('정리본 .md 다운로드 완료');}
}

  <div class="tbl-wrap"><table class="t"><thead><tr><th>가설</th><th>적용 범위</th><th>상태</th><th>반증 조건</th></tr></thead><tbody>
    ${(S.hypotheses||[]).map(h=>`<tr onclick="openHyp('${h.id}')"><td><span class="nm">${cut(h.claim,70)}</span></td><td>${cut(h.scope,24)||'—'}</td><td>${HSTAT[h.status]||h.status||'—'}</td><td>${cut(h.falsifier,40)||'—'}</td></tr>`).join('')||`<tr><td colspan="4" class="empty">없음</td></tr>`}
  </tbody></table></div>`; }
function openHyp(id){ const h=(S.hypotheses||[]).find(x=>x.id===id); if(!h)return; openModal(`
  <div class="mh"><span class="mt">가설 후보</span><button class="mx" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div class="field"><div class="k">가설</div><div class="v">${esc(h.claim||'—')}</div></div>
    ${h.termDef?`<div class="field"><div class="k">용어 정의</div><div class="v">${esc(h.termDef)}</div></div>`:''}
    <div class="kv" style="margin-bottom:6px;">
      <div class="cell"><div class="k">적용 범위</div><div class="v">${esc(h.scope||'—')}</div></div>
      <div class="cell"><div class="k">상태</div><div class="v">${HSTAT[h.status]||h.status||'—'}</div></div>
      <div class="cell"><div class="k">연결 분기 기준</div><div class="v">${esc(axisName(h.axisId)||'—')}</div></div>
    </div>
    ${h.falsifier?`<div class="field"><div class="k">반증 조건</div><div class="v">${esc(h.falsifier)}</div></div>`:''}
    ${h.ruleCandidate?`<div class="field"><div class="k">적용 규칙 초안</div><div class="v">${esc(h.ruleCandidate)}</div></div>`:''}
  </div>`); }
let clmSearch='';
function renderClaims(){ const rows=S.claims.slice(0,400);
  const hay=c=>{const e=getEvidence(c.evidenceId);return esc(((c.claimText||'')+' '+(e?e.title:'')).toLowerCase());};
  document.getElementById('view-admin-claims').innerHTML=`
  ${adminCrumb('근거 문장')}
  <div class="vh"><div><h2>근거 문장</h2><div class="sub">근거에서 떼어낸 문장 단위. 검수·관리용입니다.</div></div></div>
  <div class="searchrow"><input type="text" id="clmq" placeholder="문장 검색" oninput="clmSearch=this.value;tblFilter(clmSearch,'clmTbody','clmShown')"></div>
  <div class="tbl-wrap"><table class="t"><thead><tr><th>문장</th><th>범위</th><th>신뢰</th><th>근거</th></tr></thead><tbody id="clmTbody">
    ${rows.map(c=>{const e=getEvidence(c.evidenceId);return `<tr data-hay="${hay(c)}" onclick="${e?`openEv('${e.evidenceId}')`:''}"><td>${cut(c.claimText,80)}</td><td>${cut(c.scope,16)||'—'}</td><td>${relLabel(c.confidence)}</td><td>${e?cut(e.title,30):'—'}</td></tr>`;}).join('')||`<tr><td colspan="4" class="empty">없음</td></tr>`}
  </tbody></table></div>
  <div class="meta-ct"><span id="clmShown">${rows.length}</span>개 문장${S.claims.length>400?` (전체 ${S.claims.length}개 중 상위 400개)`:''}</div>`;
  if(clmSearch){ const q=document.getElementById('clmq'); if(q)q.value=clmSearch; tblFilter(clmSearch,'clmTbody','clmShown'); }
}

/* ===== modal ===== */
function openModal(html){ document.getElementById('modal').innerHTML=html; document.getElementById('mbg').classList.add('show'); }
function closeModal(){ document.getElementById('mbg').classList.remove('show'); }
document.getElementById('mbg').addEventListener('click',e=>{ if(e.target.id==='mbg') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ===== backup / restore / bulk ===== */
function exportJSON(){ const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}); const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download='admissions-research-backup.json'; a.click(); URL.revokeObjectURL(u); toast('백업 내보내기 완료'); closeAdmin(); }
function importJSON(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>{ try{ const d=JSON.parse(e.target.result); if(!d.evidence){toast('형식이 올바르지 않습니다');return;} S=d; persist(); location.reload(); }catch(err){toast('복원 실패 — JSON 확인');} }; r.readAsText(f); ev.target.value=''; }
const CASE_TEMPLATE=`[
  {
    "title": "사례명 — 지역·배경",
    "evidenceRole": "case",
    "caseType": "admit",
    "caseKind": "individual",
    "region": "West / Bay Area",
    "koreanAsianStatus": "explicit-korean",
    "resultSchool": "Stanford, UCLA 합격",
    "schoolGroup": "Ivy/Private",
    "major": "CS",
    "gpa": "4.0 UW",
    "sat": "1560",
    "apList": "AP 4과목 ...",
    "activities": "...",
    "essayTheme": "...",
    "advice": "...",
    "facts": "공개된 사실만",
    "breaksConvention": "(대조군일 때만)",
    "sourceName": "출처명",
    "url": "https://",
    "reliability": "low",
    "verificationStatus": "unverified"
  }
]`;
function openBulk(){ closeAdmin(); openModal(`
  <div class="mh"><span class="mt">근거 / 사례 일괄 추가</span><button class="mx" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div class="field"><div class="v">기존 항목은 덮어쓰지 않고 추가됩니다(같은 id면 갱신). JSON 배열 또는 CSV/TSV(헤더 포함). 학생 사례는 <b>"evidenceRole":"case"</b>, 대조군은 <b>"caseType":"control"</b>.</div></div>
    <textarea id="bulkText" rows="9" placeholder='${esc(CASE_TEMPLATE)}'></textarea>
    <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn sm" onclick="copyTemplate()">사례 템플릿 복사</button>
      <button class="btn sm" onclick="document.getElementById('bulkFile').click()">파일 선택 (.json/.csv)</button>
    </div>
  </div>
  <div class="mfoot"><button class="btn primary" onclick="runBulkText()">추가 / 갱신</button><button class="btn" onclick="closeModal()">취소</button></div>`); }
function copyTemplate(){ try{navigator.clipboard.writeText(CASE_TEMPLATE);toast('템플릿 복사됨');}catch(e){document.getElementById('bulkText').value=CASE_TEMPLATE;toast('템플릿을 입력란에 넣었습니다');} }
function bulkFile(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>doBulk(e.target.result); r.readAsText(f); ev.target.value=''; }
function runBulkText(){ const t=(document.getElementById('bulkText').value||'').trim(); if(!t){toast('내용을 붙여넣으세요');return;} doBulk(t); }
function parseCSV(text){ const delim=text.indexOf('\t')>-1&&(text.indexOf('\t')<text.indexOf(',')||text.indexOf(',')===-1)?'\t':','; const rows=[];let row=[],cur='',q=false; for(let i=0;i<text.length;i++){const c=text[i]; if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;} else {if(c==='"')q=true; else if(c===delim){row.push(cur);cur='';} else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++; if(cur!==''||row.length){row.push(cur);rows.push(row);row=[];cur='';}} else cur+=c;}} if(cur!==''||row.length){row.push(cur);rows.push(row);} if(!rows.length)return []; const h=rows[0].map(x=>x.trim()); return rows.slice(1).filter(r=>r.some(c=>c.trim())).map(r=>{const o={};h.forEach((k,i)=>o[k]=(r[i]||'').trim());return o;}); }
function doBulk(raw){ let items=[]; try{ if(raw.trim()[0]==='['||raw.trim()[0]==='{'){const p=JSON.parse(raw);items=Array.isArray(p)?p:(p.evidence||[p]);} else items=parseCSV(raw); }catch(e){toast('파싱 실패 — JSON/CSV 확인');return;} if(!items.length){toast('항목 없음');return;} let add=0,upd=0; items.forEach(it=>{ if(!it.title)return; let rel=it.reliability||'mid'; if(rel==='med')rel='mid'; const n={title:it.title,category:it.category||'',schoolGroup:it.schoolGroup||'',sourceType:it.sourceType||'media',reliability:rel,summary:it.summary||it.facts||'',facts:it.facts||'',quote:it.quote||'',url:it.url||'',sourceName:it.sourceName||'',caution:it.caution||'',yearCycle:it.yearCycle||it.year||'',verificationStatus:it.verificationStatus||'unverified',evidenceRole:it.evidenceRole||'',caseType:it.caseType||'',caseKind:it.caseKind||'',region:it.region||'',koreanAsianStatus:it.koreanAsianStatus||'',resultSchool:it.resultSchool||'',major:it.major||'',gpa:it.gpa||'',sat:it.sat||'',apList:it.apList||'',activities:it.activities||'',essayTheme:it.essayTheme||'',advice:it.advice||'',breaksConvention:it.breaksConvention||''}; const ex=it.id?getEvidence(it.id):S.evidence.find(e=>e.title===n.title); if(ex){Object.assign(ex,n);upd++;}else{const id=it.id||uid('e-');S.evidence.push({id,evidenceId:id,...n});add++;} }); closeModal(); persist(); render(); toast(`${add}개 추가, ${upd}개 갱신 · 총 ${S.evidence.length}개`); }

/* ===== init ===== */
applyTheme(document.documentElement.getAttribute('data-theme')||'light');
render();
</script>
